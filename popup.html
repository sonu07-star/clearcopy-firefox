<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClearCopy</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon.svg" width="24" height="24" alt="">
        <strong>ClearCopy</strong>
      </header>

      <section id="result-card" class="result-card loading" aria-live="polite">
        <div class="result-heading">
          <span id="result-icon" class="result-icon" aria-hidden="true">...</span>
          <div>
            <h1 id="result-title">Checking this link</h1>
            <p id="result-summary">Looking for tracking parameters.</p>
          </div>
        </div>

        <div id="removed-list" class="removed-list" hidden></div>

        <label for="clean-url">Clean link</label>
        <input id="clean-url" type="text" readonly value="Loading...">
      </section>

      <div class="actions">
        <button id="copy-button" class="primary" type="button" disabled>
          Copy clean link
        </button>
        <button id="replace-button" type="button" disabled>
          Replace current address
        </button>
      </div>

      <footer>Runs locally. No browsing data collected.</footer>
    </main>

    <script src="cleaner.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
